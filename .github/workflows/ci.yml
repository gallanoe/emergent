name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run fmt:check

      - name: Typecheck
        run: bun run typecheck

      # Runs the same suite as `bun run test`, with coverage on top. Fails if
      # coverage drops below the thresholds in vitest.config.ts.
      - name: Test (with coverage)
        run: bun run test:coverage

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Frontend tests
        run: bun run test:frontend

      - name: Rust check
        run: cargo check --workspace

      - name: Rust lint
        run: bun run lint:rust

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Supersedes a plain `cargo test --workspace` — same tests, instrumented.
      # Fails if line coverage drops below --fail-under-lines.
      - name: Rust test (with coverage)
        run: bun run test:rust:coverage:lcov

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            coverage/frontend/lcov.info
            coverage/rust/lcov.info
          if-no-files-found: warn
